[mcu cartographer]
serial: /dev/cartographer
restart_method: command
is_non_critical: True
reconnect_interval: 2.0
[cartographer]
mcu: cartographer
x_offset: 0
y_offset: -15
verbose: yes

[temperature_sensor cartographer]
sensor_type: temperature_mcu
sensor_mcu: cartographer
min_temp: 0
max_temp: 105

[bed_mesh]
zero_reference_position: 175, 175
speed: 200
mesh_min: 10, 5
mesh_max: 340, 330
probe_count: 31, 31
mesh_pps: 0, 0
adaptive_margin: 10
fade_start: 5.0
fade_end: 50.0
bicubic_tension: 0.2
algorithm: bicubic
horizontal_move_z: 3
split_delta_z: 0.01
move_check_distance: 3

[stepper_y]
position_endstop: -0.4
position_min: -0.4

[stepper_z]
endstop_pin: probe:z_virtual_endstop
homing_retract_dist: 0

